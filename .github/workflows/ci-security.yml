name: CI Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-security-docker:
    name: Test, Security Scan, Docker Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest bandit pip-audit semgrep

      - name: Run tests
        run: |
          mkdir -p .pytest-temp
          python -m pytest -v --basetemp=.pytest-temp -p no:cacheprovider

      - name: Bandit SAST scan
        run: |
          python -m bandit -r app.py app -x tests,venv || true

      - name: pip-audit dependency scan
        run: |
          python -m pip_audit -r requirements.txt || true

      - name: Semgrep SAST scan
        run: |
          semgrep scan --config auto --exclude venv . || true

      - name: Build Docker image
        run: |
          docker build -t devsecops-flask-platform:ci .

      - name: Trivy image vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-flask-platform:ci
          format: table
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker image
        if: github.event_name == 'push'
        run: |
          docker tag devsecops-flask-platform:ci ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-flask-platform:latest
          docker tag devsecops-flask-platform:ci ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-flask-platform:${{ github.sha }}

      - name: Push Docker image to Docker Hub
        if: github.event_name == 'push'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-flask-platform:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-flask-platform:${{ github.sha }}